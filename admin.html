<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stc Hail Branch — Admin Control Portal</title>
    <!-- استدعاء أدوات التنسيق والخطوط الفاخرة لفرع حائل -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة Supabase JS الرسمية للربط السحابي -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --stc-purple: #7a22b3;
            --stc-purple-glow: rgba(122, 34, 179, 0.4);
            --stc-pink: #ff007f;
            --space-deep: #05020c;
            --glass-base: rgba(18, 10, 31, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f0f7;
            --text-muted: #a29bb0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--space-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* خلفية النجوم المتحركة التفاعلية لتوحيد مظهر البوابة */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-base);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
        }

        .stc-input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .stc-input:focus {
            border-color: var(--stc-pink);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
            outline: none;
        }

        .btn-stc {
            background: linear-gradient(90deg, var(--stc-purple), var(--stc-pink));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-stc:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.55);
        }

        /* الإشعار المنبثق الدائري المضيء */
        .toast-notification {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="p-4 sm:p-6 min-h-screen flex items-center justify-center">

    <!-- محرك النجوم التفاعلي الخلفي -->
    <canvas id="spaceCanvas"></canvas>

    <!-- إشعار المزامنة والنجاح -->
    <div id="toastNotification" class="toast-notification fixed bottom-10 left-6 z-50 glass-panel px-6 py-4 rounded-xl border border-emerald-500 flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400">
            <i class="fa-solid fa-circle-check animate-bounce"></i>
        </div>
        <div>
            <h4 class="text-xs font-bold text-white">تمت مزامنة فرع حائل بنجاح</h4>
            <p class="text-[10px] text-slate-400 mt-0.5">انعكست البيانات فوراً على العرض التنفيذي السحابي.</p>
        </div>
    </div>

    <div class="w-full max-w-3xl glass-panel p-8 rounded-2xl relative overflow-hidden border border-white/5">
        
        <!-- الهيدر التنظيمي للفرع -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-[#7a22b3] to-[#ff007f] flex items-center justify-center text-white font-black text-xl shadow-[0_0_15px_rgba(255,0,127,0.4)]">stc</div>
                <div>
                    <h1 class="text-lg sm:text-xl font-black text-white">إدارة فرع منطقة حائل</h1>
                    <p class="text-xs text-slate-400 mt-1">المزامنة السحابية المباشرة للأصول والمساحات مع لوحة العرض التنفيذية.</p>
                </div>
            </div>
            <a href="index.html" class="px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition text-xs font-bold flex items-center gap-1.5 text-slate-300">
                <i class="fa-solid fa-eye text-[#ff007f]"></i> معاينة العرض الرئيسي
            </a>
        </div>

        <!-- مصفوفة الحقول والبيانات التقنية لفرع حائل -->
        <form id="branchAdminForm" class="space-y-6" onsubmit="event.preventDefault();">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- المجموعة الأولى: الأرقام والمساحات المعتمدة -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black text-[#ff007f] uppercase tracking-wider mb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-calculator"></i> المعايير المالية والمساحات
                    </h3>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">الاستثمار المقترح الكلي (SAR)</label>
                        <input type="text" id="adm-price" class="stc-input" value="26,000,000">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">مساحة الأرض لفرع حائل (م²)</label>
                        <input type="text" id="adm-landArea" class="stc-input" value="4,104">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">إجمالي مسطحات البناء للفرع (BUA - م²)</label>
                        <input type="text" id="adm-bua" class="stc-input" value="4,165">
                    </div>
                </div>

                <!-- المجموعة الثانية: اللوجستيات والمراحل -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black text-[#ff007f] uppercase tracking-wider mb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-truck-ramp-box"></i> الكفاءة اللوجستية والإنشائية
                    </h3>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">طاقة مواقف السيارات المخصصة لفرع حائل</label>
                        <input type="number" id="adm-parking" class="stc-input" value="50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">نسبة التجهيزات والتشطيبات الداخلية الحرجة (%)</label>
                        <input type="number" id="adm-fitout" class="stc-input" value="75" min="0" max="100">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">نسبة إنجاز الهيكل والواجهات (%)</label>
                        <input type="number" id="adm-progress" class="stc-input" value="53" min="0" max="100">
                    </div>
                </div>

            </div>

            <!-- مصفوفة تحميل وتحديث صور الأصول والواجهات -->
            <div class="pt-4 border-t border-white/5 space-y-4">
                <h3 class="text-xs font-black text-white uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-image text-[#ff007f]"></i> مصفوفة صور فرع حائل المعتمدة
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                        <label class="block text-xs font-bold text-slate-300 mb-1.5">تحديث صورة فرع حائل الأساسية (Current View)</label>
                        <input type="file" id="adm-imgCurrent" accept="image/*" class="text-xs text-slate-400 file:mr-2 file:py-1.5 file:px-4 file:rounded-full file:bg-white/10 file:text-white file:border-0 hover:file:bg-white/20 cursor-pointer w-full mb-2">
                        <input type="text" id="adm-imgCurrentUrl" placeholder="أو الصق رابط صورة خارجي مباشر هنا..." class="stc-input !p-2.5 !text-xs">
                    </div>
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                        <label class="block text-xs font-bold text-slate-300 mb-1.5">صورة المعرض الفرعي لفرع حائل (Gallery Slot A)</label>
                        <input type="file" id="adm-imgGalA" accept="image/*" class="text-xs text-slate-400 file:mr-2 file:py-1.5 file:px-4 file:rounded-full file:bg-white/10 file:text-white file:border-0 hover:file:bg-white/20 cursor-pointer w-full mb-2">
                        <input type="text" id="adm-imgGalAUrl" placeholder="أو الصق رابط صورة خارجي مباشر هنا..." class="stc-input !p-2.5 !text-xs">
                    </div>
                </div>
            </div>

            <!-- زر التحديث والمزامنة اللحظية سحابياً ومحلياً -->
            <button type="button" id="publishBtn" class="btn-stc w-full py-4 text-sm font-black text-white rounded-xl shadow-xl flex items-center justify-center gap-2 transform hover:-translate-y-0.5 active:translate-y-0 transition">
                <i class="fa-solid fa-cloud-arrow-up animate-pulse"></i> نشر ومزامنة بيانات فرع stc حائل
            </button>

        </form>

    </div>

    <!-- كود الربط السحابي بـ Supabase و LocalStorage الاحتياطي -->
    <script>
        // تهيئة بيانات بيئة Supabase المرفقة والمباشرة الخاصة بمشروعك
        const SUPABASE_URL = "https://yhktemaygekjzxwbwjsz.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloa3RlbWF5Z2Vranp4d2J3anN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDI0MjcsImV4cCI6MjA5ODMxODQyN30.KwNq4LxkOM3YYuOaRQ66n0oMSmdojeqejGrFGrXetsw"; 

        let supabaseClient = null;
        if (SUPABASE_URL && SUPABASE_ANON_KEY) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const toastNotification = document.getElementById('toastNotification');

        // جلب وتعبئة قيم الحقول من قاعدة البيانات السحابية أو المحلية فور تحميل الصفحة
        async function loadConfig() {
            if (supabaseClient) {
                try {
                    let { data, error } = await supabaseClient
                        .from('stc_hail_branch')
                        .select('*')
                        .eq('id', 1)
                        .single();
                    if (data) {
                        applyToInputs(data);
                        return;
                    }
                } catch (e) {
                    console.log("Supabase fetch failed, trying local backup.");
                }
            }

            // Fallback محلي في حال انقطاع الشبكة
            const saved = JSON.parse(localStorage.getItem('stc_dashboard_data_branch_v6'));
            if (saved) {
                document.getElementById('adm-price').value = saved.price || '26,000,000';
                document.getElementById('adm-landArea').value = saved.landarea || saved.landArea || '4,104';
                document.getElementById('adm-bua').value = saved.bua || '4,165';
                document.getElementById('adm-progress').value = saved.progress || '53';
                document.getElementById('adm-parking').value = saved.parking || '50';
                document.getElementById('adm-fitout').value = saved.fitout || '75';
            }
        }

        function applyToInputs(data) {
            document.getElementById('adm-price').value = data.price;
            document.getElementById('adm-landArea').value = data.landarea || data.landArea || '4,104';
            document.getElementById('adm-bua').value = data.bua;
            document.getElementById('adm-progress').value = data.progress;
            document.getElementById('adm-parking').value = data.parking;
            document.getElementById('adm-fitout').value = data.fitout;
            if (data.img_current && data.img_current.startsWith("http")) document.getElementById('adm-imgCurrentUrl').value = data.img_current;
            if (data.img_gala && data.img_gala.startsWith("http")) document.getElementById('adm-imgGalAUrl').value = data.img_gala;
        }

        // معالجة ونشر البيانات السحابية
        async function publishConfig() {
            const config = {
                price: document.getElementById('adm-price').value,
                landarea: document.getElementById('adm-landArea').value,
                bua: document.getElementById('adm-bua').value,
                progress: parseInt(document.getElementById('adm-progress').value),
                parking: parseInt(document.getElementById('adm-parking').value),
                fitout: parseInt(document.getElementById('adm-fitout').value)
            };

            const imgCurrentUrl = document.getElementById('adm-imgCurrentUrl').value;
            if (imgCurrentUrl) config.img_current = imgCurrentUrl;
            
            const imgGalAUrl = document.getElementById('adm-imgGalAUrl').value;
            if (imgGalAUrl) config.img_gala = imgGalAUrl;

            // إحضار الصور المحلية الاحتياطية إن وجدت
            if (!config.img_current && localStorage.getItem('stc_img_current_v5')) {
                config.img_current = localStorage.getItem('stc_img_current_v5');
            }
            if (!config.img_gala && localStorage.getItem('stc_img_gala_v5')) {
                config.img_gala = localStorage.getItem('stc_img_gala_v5');
            }

            if (supabaseClient) {
                try {
                    const { error } = await supabaseClient
                        .from('stc_hail_branch')
                        .update(config)
                        .eq('id', 1);
                    
                    if (!error) {
                        showToast();
                        return;
                    } else {
                        console.error("Supabase update error:", error);
                    }
                } catch (e) {
                    console.log("Supabase save failed, fallback to local saving.");
                }
            }

            localStorage.setItem('stc_dashboard_data_branch_v6', JSON.stringify(config));
            showToast();
        }

        function showToast() {
            toastNotification.classList.add('show');
            setTimeout(() => {
                toastNotification.classList.remove('show');
            }, 3500);
        }

        // تحويل ورفع الصور محلياً كودياً
        function handleImageUpload(inputEl, storageKey) {
            inputEl.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            localStorage.setItem(storageKey, e.target.result);
                        } catch (err) {
                            alert("حجم الصورة كبير على ذاكرة المتصفح المؤقتة. نوصي باستخدام خيار روابط الصور الخارجية المباشرة.");
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        handleImageUpload(document.getElementById('adm-imgCurrent'), 'stc_img_current_v5');
        handleImageUpload(document.getElementById('adm-imgGalA'), 'stc_img_gala_v5');

        document.getElementById('publishBtn').addEventListener('click', publishConfig);

        // تشغيل النجوم الكونية الخلفية بـ Canvas
        const spaceCanvas = document.getElementById('spaceCanvas');
        const sCtx = spaceCanvas.getContext('2d');
        
        function resizeCanvas() {
            spaceCanvas.width = window.innerWidth;
            spaceCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.8 + 0.2,
                speed: Math.random() * 0.015 + 0.005
            });
        }

        function animate() {
            sCtx.clearRect(0, 0, spaceCanvas.width, spaceCanvas.height);
            sCtx.fillStyle = '#030107';
            sCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);

            stars.forEach(star => {
                sCtx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                sCtx.beginPath();
                sCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                sCtx.fill();

                star.alpha += star.speed;
                if(star.alpha > 1 || star.alpha < 0.2) {
                    star.speed = -star.speed;
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

        // تحميل الإعدادات عند البدء
        loadConfig();
    </script>

</body>
</html>
